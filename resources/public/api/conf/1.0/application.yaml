      tags:
      - Benefit-eligibility-info
      summary: Request information that can be used to determine benefit eligibility
      parameters:
      - description: Correlation ID - used for traceability purposes - note that this value in the response matches that received in the request to allow correlation.
        in: header
        name: correlationId
        required: true
        schema:
          format: uuid
          type: string
      - description: Identity of the Originating System that made the API call.
        in: header
        name: Authorization
        required: true
        schema:
          type: string
      - description: Request the version of the API you want to use by including an Accept header with a media type of.
        in: header
        name: Accept
        required: true
        schema:
          type: string
          pattern: "application/vnd.hmrc.[version]+[content-type]"
          example: application/vnd.hmrc.1.0+json
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
              - $ref: "#/components/schemas/uk.gov.hmrc.app.benefitEligibility.model.request.ESAEligibilityCheckDataRequest"
