                        downstreamStatus: 500
                    - apiName: Liabilities
                      status: FAILURE
                      error:
                        code: BAD_REQUEST
                        message: invalid liability calculation parameters
                        downstreamStatus: 400
          headers:
            CorrelationId:
              $ref: "#/components/headers/correlationId"
