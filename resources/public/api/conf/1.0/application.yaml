              - $ref: "#/components/schemas/uk.gov.hmrc.app.benefitEligibility.model.request.SearchlightEligibilityCheckDataRequest"
            examples:
              SearchlightRequest:
                summary: Searchlight request
                value:
                  system: SEARCHLIGHT
                  benefitType: BSP
                  nationalInsuranceNumber: CD789012E
                  niContributionsAndCredits:
                    dateOfBirth: 1958-03-22
                    startTaxYear: 2018
                    endTaxYear: 2024
              BSP_request:
                summary: BSP request
                value:
                  benefitType: BSP
                  nationalInsuranceNumber: CD789012E
                  niContributionsAndCredits:
                    dateOfBirth: 1958-03-22
                    startTaxYear: 2018
                    endTaxYear: 2024
              GYSP_full_request:
                summary: GYSP request - optional fields included
                value:
                  benefitType: GYSP
                  nationalInsuranceNumber: GH567890J
                  niContributionsAndCredits:
                    dateOfBirth: 1955-06-20
                    startTaxYear: 2018
                    endTaxYear: 2023
                  longTermBenefitCalculation:
                    longTermBenefitType: GUARDIAN'S ALLOWANCE
                    pensionProcessingArea: Job Centre+ Electronic Enabled Pension Processing
              GYSP_minimal_request:
                summary: GYSP request - Minimal required fields
                value:
                  benefitType: GYSP
                  nationalInsuranceNumber: GH567890J
                  niContributionsAndCredits:
                    dateOfBirth: 1955-06-20
                    startTaxYear: 2018
                    endTaxYear: 2023
              ESA_request:
                summary: ESA request
