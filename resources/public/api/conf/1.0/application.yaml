                  benefitType: MA
                  nationalInsuranceNumber: KL890123M
                  niContributionsAndCredits:
                    dateOfBirth: 1985-04-18
                    startTaxYear: 2022
                    endTaxYear: 2023
                  liabilities:
                    searchCategories:
                    - CLASS-2-LIABILITY-UK
