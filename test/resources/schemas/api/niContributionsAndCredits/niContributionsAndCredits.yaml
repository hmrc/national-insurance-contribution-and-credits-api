  "paths": {
    "/national-insurance/contributions-and-credits": {
      "description": "# Volumes & Registered Consumers\nThis API is consumed by the following 'Registered Consumers' who would all need to be impacted when a new consumer with an associated new load first registers to use the service, or an uplift is required to the API. Each 'Registered Consumer' below will receive an additional Security Spec. document that outlines how to connect to the various environments as well as any consumer-specific authorisation/authentication details - this is unique to their connection.\n\n| Consumer | Average API Calls Per Hour | Peak API Calls Per Hour | Peak TPS |\n|----------|------------------------|---------------------|----------|\n| xxx | xxx | xxx | xxx |\n\n*TPS = Transactions per second\n\n## Version Log\n| Version | Date | Author | Description |\n|---------|------|--------|-------------|\n| 0.0.1 | 25/02/2026 | NPS ScrumTeam 4 | Initial Draft |",
      "post": {
        "tags": [
          "Person"
        ],
        "summary": "Retrieve Class 1, Class 2 and Class 3 Contribution and Credits.",
        "description": "# Purpose\nThis API provides the capability to retrieve Class 1, Class 2 and Class 3 data for an account.<br>\n- This allows a search for Class 1 contributions and Class 2 & 3 credits for a given NINO (suffix optional) and range of tax years.\n- Request payload will contain the NINO and date of birth.<br>\n- A start year for the tax year range, not before 1975 or after CY-1<br>\n- An end year for the tax year range, not before the start year or after CY-1, and no more than five years after the start year (thereby allowing a range of six years inclusive). \n## Request Data Structure & Payload Details",
        "operationId": "postNIContributionAndCredits",
        "parameters": [
          {
            "$ref": "#/components/parameters/correlationId"
          },
          {
            "$ref": "#/components/parameters/govUkOriginatorId"
          },
          {
            "$ref": "#/components/parameters/govUkOrganisationId"
          },
          {
            "$ref": "#/components/parameters/govUkUserId"
          },
          {
            "$ref": "#/components/parameters/govUkUserName"
          },
          {
            "$ref": "#/components/parameters/govUkJobRole"
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "$ref": "#/components/schemas/PostNIContributionCreditRequest"
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Successful Response",
            "headers": {
              "correlationId": {
                "$ref": "#/components/headers/correlationId"
              }
            },
            "content": {
              "application/json;charset=UTF-8": {
                "schema": {
                  "$ref": "#/components/schemas/PostNIContCredResponse"
                },
                "examples": {
                  "exampleClass1Response": {
                    "summary": "Employee with Class 1 across 2023-2024",
                    "value": {
                      "totalGraduatedPensionUnits": 9.5,
                      "class1ContributionAndCredits": [
                        {
                          "taxYear": 2024,
                          "numberOfContributionsAndCredits": 51,
                          "contributionCategoryLetter": "A",
                          "contributionCategory": "STANDARD RATE",
                          "contributionCreditType": "C1",
                          "primaryContribution": 2850,
                          "class1ContributionStatus": "VALID",
                          "primaryPaidEarnings": 32000,
                          "creditSource": "EMPLOYMENT SERVICES",
                          "employerName": "AcmeCo",
                          "latePaymentPeriod": "L"
                        },
                        {
                          "taxYear": 2023,
                          "numberOfContributionsAndCredits": 51,
                          "contributionCategoryLetter": "A",
                          "contributionCategory": "STANDARD RATE",
                          "contributionCreditType": "C1",
                          "primaryContribution": 2700,
                          "class1ContributionStatus": "VALID",
                          "primaryPaidEarnings": 30000,
                          "creditSource": "EMPLOYMENT SERVICES",
                          "employerName": "Widget",
                          "latePaymentPeriod": "L"
                        }
                      ]
                    }
                  },
                  "exampleJSAESAResponse": {
                    "summary": "Employee with Class 1 JSA/ESA Credits",
                    "value": {
                      "totalGraduatedPensionUnits": 9.5,
                      "class1ContributionAndCredits": [
                        {
                          "taxYear": 2024,
                          "numberOfContributionsAndCredits": 51,
                          "contributionCategoryLetter": "A",
                          "contributionCategory": "STANDARD RATE",
                          "contributionCreditType": "C1",
                          "primaryContribution": 2850,
                          "class1ContributionStatus": "VALID",
                          "primaryPaidEarnings": 32000,
                          "creditSource": "JSA TAPE INPUT",
                          "employerName": "AcmeCo",
                          "latePaymentPeriod": "L"
                        },
                        {
                          "taxYear": 2023,
                          "numberOfContributionsAndCredits": 51,
                          "contributionCategoryLetter": "A",
                          "contributionCategory": "STANDARD RATE",
                          "contributionCreditType": "C1",
                          "primaryContribution": 2700,
                          "class1ContributionStatus": "VALID",
                          "primaryPaidEarnings": 30000,
                          "creditSource": "EMPLOYMENT AND SUPPORT",
                          "employerName": "Widget",
                          "latePaymentPeriod": "L"
                        }
                      ]
                    }
                  },
                  "exampleClass2Response": {
                    "summary": "Self-employed with Class 2 credits",
                    "value": {
                      "totalGraduatedPensionUnits": 0,
                      "class2Or3ContributionAndCredits": [
                        {
                          "taxYear": 2024,
                          "numberOfContributionsAndCredits": 52,
                          "contributionCreditType": "C2",
                          "class2Or3EarningsFactor": 6500,
                          "class2Or3NIContributionAmount": 163.8,
                          "class2Or3CreditStatus": "VALID",
                          "creditSource": "DIRECT DEBIT",
                          "latePaymentPeriod": "LX"
                        }
                      ]
                    }
                  },
                  "maximallyPopulatedResponse": {
                    "summary": "Maximally populate response. Combined Class 1 and Class 2.",
                    "value": {
                      "totalGraduatedPensionUnits": 7,
                      "class1ContributionAndCredits": [
                        {
                          "taxYear": 2022,
                          "numberOfContributionsAndCredits": 26,
                          "contributionCategoryLetter": "B",
                          "contributionCategory": "REDUCED RATE",
                          "contributionCreditType": "C1",
                          "primaryContribution": 1200,
                          "class1ContributionStatus": "CURRENT",
                          "primaryPaidEarnings": 18000,
                          "creditSource": "EMPLOYMENT SERVICES",
                          "employerName": "Fabrik",
                          "latePaymentPeriod": "ZZ"
                        }
                      ],
                      "class2Or3ContributionAndCredits": [
                        {
                          "taxYear": 2022,
                          "numberOfContributionsAndCredits": 26,
                          "contributionCreditType": "C2",
                          "class2Or3EarningsFactor": 3250,
                          "class2Or3NIContributionAmount": 81.9,
                          "class2Or3CreditStatus": "POTENTIAL",
                          "creditSource": "DIRECT DEBIT",
                          "latePaymentPeriod": "L"
                        }
                      ]
                    }
                  }
                }
              }
            }
          },
